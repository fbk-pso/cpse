name: test

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.51.0"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync environment
        run: uv sync --frozen

      # Runs the pre-commit hooks, which include `just lint` and `just typecheck` (mypy).
      - name: pre-commit
        run: just precommit

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.51.0"

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Sync environment
        run: uv sync --frozen --python ${{ inputs.python-version }}

      - name: Clone unified-planning test cases (matching the locked commit)
        run: |
          # Use system python3 (>= 3.11) instead of `uv run python` so this
          # step works on the 3.10 matrix entry where tomllib is missing.
          sha=$(python3 -c "import tomllib; d = tomllib.load(open('uv.lock', 'rb')); print(next(p['source']['git'].rsplit('#', 1)[1] for p in d['package'] if p['name'] == 'unified-planning'))")
          git clone --filter=blob:none https://github.com/aiplan4eu/unified-planning.git up-checkout
          git -C up-checkout checkout "$sha"

      - name: Register CPSE engines
        run: |
          printf '[engine cpse]\nmodule_name: cpse\nclass_name: CPSE\n\n[engine cpse-timepoints]\nmodule_name: cpse\nclass_name: CPSETimepoints\n' > .up.ini

      - name: Run UP test report (cpse)
        run: uv run python up-checkout/up_test_cases/report.py cpse

      - name: Run UP test report (cpse-timepoints)
        run: uv run python up-checkout/up_test_cases/report.py cpse-timepoints

      - name: Run CPSE pytest suite
        run: just test
