name: test

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.51.0"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync environment
        run: uv sync --frozen

      # Runs the pre-commit hooks, which include `just lint` and `just typecheck` (mypy).
      - name: pre-commit
        run: just precommit

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.51.0"

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Sync environment
        run: uv sync --frozen --python ${{ inputs.python-version }}

      # unified-planning is installed from PyPI (dev group); its up_test_cases/
      # are not shipped on PyPI, so clone the repo (master) to run report.py.
      - name: Clone unified-planning test cases (master)
        run: |
          git clone --filter=blob:none --single-branch --branch master \
            https://github.com/aiplan4eu/unified-planning.git up-checkout

      - name: Register CPSE engines
        run: |
          printf '[engine cpse]\nmodule_name: cpse\nclass_name: CPSE\n\n[engine cpse-timepoints]\nmodule_name: cpse\nclass_name: CPSETimepoints\n' > .up.ini

      - name: Run UP test report (cpse)
        run: uv run python up-checkout/up_test_cases/report.py cpse

      - name: Run UP test report (cpse-timepoints)
        run: uv run python up-checkout/up_test_cases/report.py cpse-timepoints

      - name: Run CPSE pytest suite
        run: just test
