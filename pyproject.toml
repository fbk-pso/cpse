[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cpse"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "ortools==9.12.4544",
    "unified-planning"
]
authors = []
description = "Constraint Programming Scheduling Engine"
readme = "README.md"
license = "LGPLv3"
license-files = ["LICENSE"]

[project.optional-dependencies]
dev = [
    "pytest==8.3.5",
    "black==25.12.0",
    "mypy==1.19.1"
]